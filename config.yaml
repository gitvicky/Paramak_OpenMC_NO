num_samples: 2  # Number of DOE samples / reactor cases to generate in this run.
random_seed: 42  # RNG seed for reproducible parameter sampling and source generation.

execution:
  run_dir: runs  # Directory where per-iteration run folders are created.
  dataset_dir: dataset  # Directory where compiled dataset artifacts are written.
  run_prefix: iter_  # Prefix used when naming iteration folders.
  run_padding: 6  # Zero-padding width for iteration names, e.g. iter_000001.
  max_workers: 1  # Maximum parallel workers for stages that support concurrent execution.
  allow_macos_fallbacks: true  # Allow placeholder outputs on macOS when full CAD/OpenMC tooling is unavailable.

reactor:
  rotation_angle: 360.0  # CAD sweep angle in degrees. 360 gives a full tokamak; 180 gives a half-model.

geometry_bounds:
  major_radius: [250.0, 500.0]  # Sample range [cm] for plasma major radius. Covers compact-to-medium spherical tokamak sizes without extreme machine scales.
  minor_radius: [60.0, 140.0]  # Sample range [cm] for plasma minor radius. Broad enough for variation while staying within a plausible aspect range.
  center_column_shield_inner_radius: [20.0, 40.0]  # Sample range [cm] for the inner radius of the center-column shield.
  center_column_shield_outer_radius: [55.0, 95.0]  # Sample range [cm] for the outer radius of the center-column shield; kept comfortably above the inner-radius range.
  blanket_thickness: [40.0, 110.0]  # Sample range [cm] for blanket thickness. Varies shielding/breeding volume without unrealistically thin or bulky blankets.
  divertor_width: [25.0, 65.0]  # Sample range [cm] for divertor width. Adds geometric variety while staying in a more credible range.

plasma_source_bounds:
  ion_density_origin: [8.0e18, 1.2e20]  # DOE range for baseline ion density [m^-3], spanning lower-performance to strongly burning-plasma-like conditions.
  ion_density_pedestal_fraction: [0.65, 0.95]  # DOE range for pedestal/core density ratio. Keeps edge density substantial without forcing a flat profile.
  ion_density_separatrix_fraction: [0.08, 0.22]  # DOE range for edge/core density ratio. Allows edge variation while avoiding unrealistically hollow edges.
  ion_density_peaking_factor: [0.8, 2.0]  # DOE range for density peaking. Covers flatter and moderately peaked profiles.
  ion_temperature_origin: [8.0, 25.0]  # DOE range for baseline ion temperature input, spanning moderate to hot plasma conditions.
  ion_temperature_pedestal_fraction: [0.25, 0.60]  # DOE range for pedestal/core temperature ratio. Broadens or sharpens the source while staying plausible for H-mode-like cases.
  ion_temperature_separatrix_fraction: [0.01, 0.06]  # DOE range for edge/core temperature ratio. Keeps the extreme edge cool but non-negligible.
  ion_temperature_peaking_factor: [1.5, 5.0]  # DOE range for temperature peaking. Avoids extremely flat or unrealistically needle-like cores.
  ion_temperature_beta: [1.5, 4.5]  # DOE range for how abruptly temperature rolls off toward the pedestal.
  elongation: [1.2, 2.0]  # DOE range for plasma elongation. Covers typical modest-to-strong vertical stretching.
  triangularity: [0.2, 0.6]  # DOE range for triangularity, from mild to clearly D-shaped plasmas.
  shafranov_shift: [0.0, 20.0]  # DOE range [cm] for outward Shafranov shift of magnetic surfaces.
  pedestal_radius_fraction: [0.75, 0.92]  # DOE range for pedestal location as a fraction of minor radius. Keeps the pedestal in a realistic outer-plasma band.

tokamak_source:
  enabled: true  # Use the detailed tokamak plasma source instead of the simple fallback point source.
  strict: true  # Stop the run if plasma-source generation fails, rather than silently falling back.
  mode: H  # Confinement mode. H-mode gives a pedestal-like edge profile; L/A use different radial profile shapes.
  fuel:
    D: 0.5  # Deuterium fraction. Together with T sets the DD and DT reaction contributions.
    T: 0.5  # Tritium fraction. Together with D sets the DT and TT reaction contributions.
  sample_size: 1000  # Number of sampled plasma source rings. Higher values smooth the source but increase setup cost.

openmc_settings:
  particles: 50000  # Histories per batch. Higher values reduce tally noise but increase runtime.
  batches: 100  # Number of fixed-source batches to run. More batches generally improve statistics.
  inactive: 0  # Batches skipped from scoring; usually zero for fixed-source calculations.
  statepoint_batches: [10, 50, 100]  # Batch numbers where OpenMC writes statepoint files for inspection or restart.

mesh:
  dimension: [40, 40, 40]  # Number of mesh bins in x, y, z for flux and heating tallies.
  lower_left: [-800.0, -800.0, -800.0]  # Lower-left corner [cm] of the regular tally mesh.
  upper_right: [800.0, 800.0, 800.0]  # Upper-right corner [cm] of the regular tally mesh.

cad_to_dagmc_settings:
  min_mesh_size: 10.0  # Minimum surface mesh size used during CAD-to-DAGMC conversion.
  max_mesh_size: 25.0  # Maximum surface mesh size used during CAD-to-DAGMC conversion. Larger values coarsen the mesh.

openmc_data:
  cross_sections: .openmc-data/fendl-3.2-hdf5/cross_sections.xml  # Path to the OpenMC cross_sections.xml nuclear data library.

outputs:
  doe_csv: dataset/doe_parameters.csv  # CSV file containing sampled DOE input parameters.
  doe_parquet: dataset/doe_parameters.parquet  # Parquet copy of the sampled DOE input parameters.
  compiled_hdf5: dataset/compiled_neutronics_data.h5  # Final compiled dataset containing inputs and extracted neutronics outputs.
  extraction_report: dataset/extraction_report.json  # Summary report from the extraction/compilation stage.
  run_manifest: run_metadata.json  # Per-run metadata file written during CAD generation.
  openmc_manifest: openmc_status.json  # Per-run metadata file written during the OpenMC stage.
