num_samples: 2
random_seed: 42

execution:
  run_dir: runs
  dataset_dir: dataset
  run_prefix: iter_
  run_padding: 6
  max_workers: 1
  allow_macos_fallbacks: true

geometry_bounds:
  major_radius: [250.0, 450.0]
  minor_radius: [50.0, 150.0]
  center_column_shield_inner_radius: [20.0, 40.0]
  center_column_shield_outer_radius: [50.0, 80.0]
  blanket_thickness: [50.0, 100.0]
  divertor_width: [30.0, 60.0]

plasma_source_bounds:
  ion_density_origin: [1.0e19, 1.0e20]
  ion_temperature_origin: [10.0, 25.0]
  elongation: [1.2, 2.0]
  triangularity: [0.3, 0.6]
  shafranov_shift: [0.0, 20.0]

tokamak_source:
  enabled: true
  strict: true
  mode: H
  ion_density_centre: 1.09e20
  ion_density_pedestal: 1.09e20
  ion_density_peaking_factor: 1.0
  ion_density_separatrix: 3.0e19
  ion_temperature_centre: 4.59e4
  ion_temperature_pedestal: 6.09e3
  ion_temperature_separatrix: 1.0e2
  ion_temperature_peaking_factor: 8.06
  ion_temperature_beta: 6.0
  pedestal_radius_fraction: 0.8
  fuel:
    D: 0.5
    T: 0.5
  sample_size: 1000

openmc_settings:
  particles: 10000
  batches: 50
  inactive: 10
  statepoint_batches: [50]

mesh:
  dimension: [40, 40, 40]
  lower_left: [-500.0, -500.0, -500.0]
  upper_right: [500.0, 500.0, 500.0]

cad_to_dagmc_settings:
  min_mesh_size: 10.0
  max_mesh_size: 25.0

openmc_data:
  cross_sections: .openmc-data/fendl-3.2-hdf5/cross_sections.xml

outputs:
  doe_csv: dataset/doe_parameters.csv
  doe_parquet: dataset/doe_parameters.parquet
  compiled_hdf5: dataset/compiled_neutronics_data.h5
  extraction_report: dataset/extraction_report.json
  run_manifest: run_metadata.json
  openmc_manifest: openmc_status.json
